name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  backend:
    name: Backend smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Alembic migrations on smoke database
        working-directory: backend
        env:
          DATABASE_URL: sqlite+pysqlite:////tmp/romans_erp_ci.db
          SECRET_KEY: ci-secret
          CORS_ORIGINS: http://127.0.0.1:5173
        run: alembic upgrade head

      - name: Seed demo data
        working-directory: backend
        env:
          DATABASE_URL: sqlite+pysqlite:////tmp/romans_erp_ci.db
          SECRET_KEY: ci-secret
          CORS_ORIGINS: http://127.0.0.1:5173
        run: python -m app.db.seed

      - name: Import FastAPI application
        working-directory: backend
        env:
          DATABASE_URL: sqlite+pysqlite:////tmp/romans_erp_ci.db
          SECRET_KEY: ci-secret
          CORS_ORIGINS: http://127.0.0.1:5173
        run: python -c "from app.main import app; assert len(app.routes) >= 50; print(app.title, len(app.routes))"

  frontend:
    name: Frontend build and Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Chromium
        working-directory: frontend
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        working-directory: frontend
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces and screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7
