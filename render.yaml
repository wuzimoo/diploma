services:
  - type: web
    name: romans-erp-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: CORS_ORIGINS
        value: http://localhost:5173
      - key: DATABASE_URL
        fromDatabase:
          name: romans-erp-db
          property: connectionString
databases:
  - name: romans-erp-db
    databaseName: romans_erp
    user: romans_erp
