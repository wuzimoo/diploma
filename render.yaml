services:
  - type: web
    name: romans-erp-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: CORS_ORIGINS
        value: https://frontend-pv2bfge8f-daniils-projects-5bff5a67.vercel.app,https://frontend-three-kappa-60.vercel.app,http://localhost:5173
      - key: DATABASE_URL
        fromDatabase:
          name: romans-erp-db
          property: connectionString
databases:
  - name: romans-erp-db
    databaseName: romans_erp
    user: romans_erp_user
    plan: free
    region: frankfurt
